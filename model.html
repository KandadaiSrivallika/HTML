<!DOCTYPE html>
<html>
<head>
<title>Different Outputs Example</title>
<style>
body{
    font-family: Arial;
    text-align : Center;
}
/*Respnsive message*/
@media screen and (mix-width: 600px){
    body{
       background-c0lor: lightyellow;
    }
}
</style>
<script>

function showRespnsiveMessage(){
 //innerHTML output
 document.getElementById("output").innerHTML=
 "This page is now in MOBILE VIEW(Responsive Design)";
}
function show404Error(){
//alert output
   alert("404 Error : Page not Found");
}
function showConsoleMessage(){
  //console output
   console.log("User clicked help option");
}
</script>
</head>
<body onload="showResponsiveMessage()">
<h2>Different Output Methods</h2>
<button onclick="show404Error()">Open Invalid Page</button>
<button onclick="showConsoleMessage()">Help</button>
<p id="Output"></p>
</body>
</html>
