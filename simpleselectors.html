<!DOCTYPE html>
<html>
<title>Simple Selectors</title>
<style>/* Element selector*/
p {
    color: blue;
}
/* ID Selector*/
#main{
    color: red;
}
/*Class Selector*/
.note{
    color: green;
}
/*Group Selector*/
h1, h2 {
  text-align: center;
}
/* Universal selector */
*{
	font -family: Arial;
}
</style>
</head>
<body>
<h1 id="main">CSS Selectors</h1>
<h2>INTRODUCTION</h2>
<p>SELECTOR FORMS.</p>
<p class="note">A CSS selector is used to select HTML elements so that we can apply styles (color, size, layout, etc.) to them.</p>
</body>
</html>
