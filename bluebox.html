<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model Example</title>
    <style>
    .box {
        /* Content dimensions */
        width: 200px;
        height: 100px;
        background-color: lightblue;
        padding: 20px;
        border: 5px solid blue;
        margin: 30px;
        text-align: center;
    }
    </style>
</head>
<body>
    <h2>CSS Box Model</h2>
    <!-- Fixed: Added the missing '<' before div -->
    <div class="box">
        This is the Content
    </div>
</body>
</html>
